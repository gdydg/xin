# .github/workflows/extract-stream.yml
name: Extract M3U8 Stream URLs

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '*/30 * * * *' # 可选：每30分钟自动更新一次

# 赋予 Action 读写仓库的权限 (必须有这个才能 Push)
permissions:
  contents: write

jobs:
  run-extraction:
    runs-on: ubuntu-latest
    
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: |
          npm init -y
          npm install playwright

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: 执行提取脚本生成 M3U 和 TXT
        run: node extract_m3u8.js

      - name: 提交并推送到仓库
        run: |
          # 配置 Git 机器人信息
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加生成的文件
          git add live.m3u live.txt
          
          # 检查是否有文件变动，如果有则提交并推送
          if git diff --staged --quiet; then
            echo "直播源未发生变化，无需提交。"
          else
            git commit -m "自动更新: 抓取最新直播流 [skip ci]"
            git push
            echo "最新直播源已推送至仓库根目录！"
          fi
